server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  main:
    lazy-initialization: ${SPRING_LAZY_INITIALIZATION:false}
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:10000}
          timeout: ${SMTP_TIMEOUT:10000}
          writetimeout: ${SMTP_WRITE_TIMEOUT:10000}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ma_sante_assurance}?sslmode=${DB_SSLMODE:disable}&connectTimeout=${DB_CONNECT_TIMEOUT:10}&socketTimeout=${DB_SOCKET_TIMEOUT:30}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: '{"time":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","logger":"%logger{36}","thread":"%thread","msg":"%m"}%n'

app:
  seed:
    enabled: ${APP_SEED_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    secure-cookies: ${SECURE_COOKIES:false}
  jwt:
    issuer: ma-sante-assurance
    access-token-minutes: 15
    refresh-token-days: 14
    secret: ${JWT_SECRET:change_this_secret_key_with_at_least_32_chars}
  paydunya:
    public-key: ${PAYDUNYA_PUBLIC_KEY}
    private-key: ${PAYDUNYA_PRIVATE_KEY}
    token: ${PAYDUNYA_TOKEN}
    api-url: ${PAYDUNYA_API_URL:https://api.paydunya.com}
    ipn-url: ${PAYDUNYA_IPN_URL}
    mode: ${PAYDUNYA_MODE:test}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID}
    auth-token: ${TWILIO_AUTH_TOKEN}
    from-phone: ${TWILIO_FROM_PHONE}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
    folder: ${CLOUDINARY_UPLOAD_FOLDER:ma_sante_assurance}
