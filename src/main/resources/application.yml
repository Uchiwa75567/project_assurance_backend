server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ma_sante_assurance}?sslmode=${DB_SSLMODE:require}&connectTimeout=${DB_CONNECT_TIMEOUT:10}&socketTimeout=${DB_SOCKET_TIMEOUT:30}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: '{"time":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%p","logger":"%logger{36}","thread":"%thread","msg":"%m"}%n'

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    secure-cookies: ${SECURE_COOKIES:false}
  jwt:
    issuer: ma-sante-assurance
    access-token-minutes: 15
    refresh-token-days: 14
    secret: ${JWT_SECRET:change_this_secret_key_with_at_least_32_chars}
